[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "commit-history-uv"
version = "0.1.0"
description = "Cross-platform git commit history CLI for uv/Python with CI, charts, and MCP-friendly output."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
authors = [
  { name = "VKrishna04", email = "github@vkrishna04.me" }
]
keywords = ["git", "commit-history", "uv", "cli", "release-notes", "ci", "mcp", "charts"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Version Control :: Git"
]

[project.urls]
Homepage = "https://github.com/Life-Experimentalist/commit-history-uv"
Repository = "https://github.com/Life-Experimentalist/commit-history-uv"
Issues = "https://github.com/Life-Experimentalist/commit-history-uv/issues"

[project.scripts]
commit-history-uv = "commit_history_uv.cli:main"
rg-commit-history-py = "commit_history_uv.cli:main"

[tool.uv]
package = true

[tool.hatch.build]
dev-mode-dirs = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/commit_history_uv"]
