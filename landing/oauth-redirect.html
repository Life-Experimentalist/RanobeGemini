<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ranobe Gemini - Login Complete</title>
	</head>

	<body>
		<script>
			(function () {
				const params = new URLSearchParams(window.location.hash.slice(1));
				const accessToken = params.get("access_token");
				const expiresIn = Number(params.get("expires_in") || 0);

				if (!accessToken) {
					document.body.innerText = "OAuth failed. No access token received.";
					return;
				}

				const expiresAt = Date.now() + expiresIn * 1000;
				window.opener?.postMessage(
					{
						source: "ranobe-gemini-oauth",
						accessToken,
						expiresAt,
					},
					"*",
				);

				document.body.innerText = "Login successful. You may close this tab.";

				const EXT_IDS = {
					firefox: "33b0347d-8e94-40d6-a169-249716997cc6",
					edge: "agbhdkiciomjlifhlfbjanpnhhokaimn",
				};

				function detectBrowser() {
					const ua = navigator.userAgent.toLowerCase();
					if (/firefox/.test(ua)) return "firefox";
					if (/edg/.test(ua)) return "edge";
					if (/chrome/.test(ua)) return "chrome";
					return "unknown";
				}

				function dedupe(list) {
					const seen = new Set();
					return list.filter((candidate) => {
						if (!candidate?.id) return false;
						const key = `${candidate.scheme}://${candidate.id}`;
						if (seen.has(key)) return false;
						seen.add(key);
						return true;
					});
				}

				function probeExtension(candidate) {
					return new Promise((resolve) => {
						const iframe = document.createElement("iframe");
						iframe.style.display = "none";
						iframe.referrerPolicy = "no-referrer";
						iframe.src = `${candidate.scheme}://${candidate.id}/library/library.html`;
						let done = false;

						const cleanup = () => {
							if (iframe.parentNode) {
								iframe.parentNode.removeChild(iframe);
							}
						};

						iframe.onload = () => {
							if (done) return;
							done = true;
							const libraryTarget = iframe.src;
							cleanup();
							resolve(libraryTarget);
						};

						iframe.onerror = () => {
							if (done) return;
							done = true;
							cleanup();
							resolve(null);
						};

						setTimeout(() => {
							if (done) return;
							done = true;
							cleanup();
							resolve(null);
						}, 1200);

						document.body.appendChild(iframe);
					});
				}

				async function tryOpenLibrary() {
					const searchParams = new URLSearchParams(window.location.search);
					const extParam = searchParams.get("ext_id") || "";
					const storedExtId = localStorage.getItem("rg_last_ext_id") || "";
					const browser = detectBrowser();

					const candidates = dedupe([
						extParam && { scheme: "chrome-extension", id: extParam },
						storedExtId && { scheme: "chrome-extension", id: storedExtId },
						browser === "firefox"
							? { scheme: "moz-extension", id: EXT_IDS.firefox }
							: null,
						browser === "edge" || browser === "chrome"
							? { scheme: "chrome-extension", id: EXT_IDS.edge }
							: null,
					]);

					for (const candidate of candidates) {
						const url = await probeExtension(candidate);
						if (!url) continue;
						localStorage.setItem("rg_last_ext_id", candidate.id);
						window.location.href = url;
						return;
					}
				}

				tryOpenLibrary();
				setTimeout(() => window.close(), 800);
			})();
		</script>
	</body>

</html>
